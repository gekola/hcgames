<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <link rel="icon" href="../favicon.svg" type="image/svg+xml">
  <title>Minesweeper — Square</title>
  <link data-trunk rel="copy-file" href="../../target/wasm32-unknown-unknown/release/minesweeper-square.wasm" />
  <link data-trunk rel="copy-file" href="vendor/mq_js_bundle.js" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; }
    canvas { display: block; width: 100vw; height: 100vh; outline: none; }
    #hotkeys { display: none; position: fixed; inset: 0; z-index: 10; background: rgba(0,0,0,0.75); align-items: center; justify-content: center; font-family: system-ui, sans-serif; }
    #hotkeys.open { display: flex; }
    #hotkeys .panel { background: #1a1a1f; color: #eee; border-radius: 8px; padding: 20px 28px; min-width: 220px; }
    #hotkeys h2 { font-size: 16px; margin-bottom: 12px; }
    #hotkeys dl { display: grid; grid-template-columns: auto 1fr; gap: 4px 16px; font-size: 14px; margin: 0; }
    #hotkeys dt { font-family: monospace; color: #8cf; }
    #hotkeys dd { margin: 0; color: #ccc; }
  </style>
</head>
<body>
  <canvas id="glcanvas" tabindex="1"></canvas>
  <script src="mq_js_bundle.js"></script>
  <script>
    miniquad_add_plugin({
      register_plugin: function(importObject) {
        importObject.env.hcg_ga_event = function(namePtr, nameLen, paramsPtr, paramsLen) {
          var name = UTF8ToString(namePtr, nameLen);
          var params = paramsLen > 0 ? JSON.parse(UTF8ToString(paramsPtr, paramsLen)) : {};
          if (window.gtag) window.gtag('event', name, params);
        };
      },
      version: 1,
      name: "hcg_analytics"
    });
  </script>
  <script>load("minesweeper-square.wasm");</script>
  <div id="hotkeys">
    <div class="panel">
      <h2>Hotkeys</h2>
      <dl>
        <dt>=</dt><dd>speed up</dd>
        <dt>-</dt><dd>slow down</dd>
        <dt>0</dt><dd>reset speed</dd>
        <dt>Space</dt><dd>pause / resume</dd>
        <dt>S</dt><dd>save screenshot</dd>
        <dt>?</dt><dd>toggle this help</dd>
        <dt>Esc</dt><dd>close</dd>
      </dl>
    </div>
  </div>
  <script>
    document.addEventListener('keydown', function(e) {
      if (e.key === '?') document.getElementById('hotkeys').classList.toggle('open');
      else if (e.key === 'Escape') document.getElementById('hotkeys').classList.remove('open');
    });
  </script>
  <script>
    document.addEventListener('keydown', function(e) {
      if (e.key !== 's' && e.key !== 'S') return;
      document.querySelector('canvas').toBlob(function(blob) {
        var url = URL.createObjectURL(blob);
        var a = document.createElement('a');
        a.href = url;
        a.download = 'minesweeper-square-screenshot.png';
        a.click();
        URL.revokeObjectURL(url);
      });
    });
  </script>
</body>
</html>
