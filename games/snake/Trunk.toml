[build]
dist = "../../dist/snake"
public_url = "."

# macroquad / miniquad does not use wasm-bindgen, so Trunk's normal `rel="rust"`
# pipeline won't work. We compile via a pre_build hook and copy artifacts with
# `data-trunk rel="copy-file"` in index.html.
#
# `vendor/mq_js_bundle.js` is fetched by the hook on first run (cached locally).
# Run from this directory:
#   trunk build --release
#   trunk serve            ← live-reloads HTML; Rust changes need manual retrigger

[[hooks]]
stage = "pre_build"
command = "sh"
command_arguments = [
  "-c",
  """
set -e
cargo build --target wasm32-unknown-unknown --release --bin snake --manifest-path ../../Cargo.toml
mkdir -p vendor
[ -f vendor/mq_js_bundle.js ] || curl -sSfL https://not-fl3.github.io/miniquad-samples/mq_js_bundle.js -o vendor/mq_js_bundle.js
""",
]
