<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <title>Snake</title>
  <!--
    macroquad uses miniquad's own WASM bindings, not wasm-bindgen.
    Trunk's `rel="rust"` pipeline is therefore incompatible.
    Instead, we build with cargo via the pre_build hook in Trunk.toml
    and copy artifacts with `rel="copy-file"`.
  -->
  <link data-trunk rel="copy-file" href="../../target/wasm32-unknown-unknown/release/snake.wasm" />
  <link data-trunk rel="copy-file" href="vendor/mq_js_bundle.js" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; }
    canvas { display: block; width: 100vw; height: 100vh; }
  </style>
</head>
<body>
  <canvas id="glcanvas" tabindex="1"></canvas>
  <script src="mq_js_bundle.js"></script>
  <script>load("snake.wasm");</script>
</body>
</html>
