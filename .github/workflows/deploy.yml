name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    environment: github-pages
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            ~/.cargo/bin/
            target/
          key: ${{ runner.os }}-wasm-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-wasm-

      # xvfb + a software GL driver give macroquad/miniquad a real GLX context with no
      # physical display, so games can be run natively to capture screenshots in CI.
      - name: Install headless screenshot dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libgl1 libglx-mesa0 libgl1-mesa-dri

      # resvg rasterizes the homepage hero SVG to a PNG for social-preview meta tags.
      - name: Install resvg
        run: cargo install resvg --locked

      - uses: jdx/mise-action@v2

      - name: Build all games and generate dist/
        env:
          MQ_JS: https://not-fl3.github.io/miniquad-samples/mq_js_bundle.js
          GTAG_ID: ${{ secrets.GTAG_ID }}
        run: mise run deploy

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
