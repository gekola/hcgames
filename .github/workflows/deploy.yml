name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    environment: github-pages
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-wasm-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-wasm-

      - name: Build all games
        env:
          MQ_JS: https://not-fl3.github.io/miniquad-samples/mq_js_bundle.js
          RUSTFLAGS: "-C link-arg=--import-undefined"
          GTAG_ID: ${{ secrets.GTAG_ID }}
        run: |
          set -euo pipefail
          for game in games/*/; do
            name=$(basename "$game")
            cargo build --target wasm32-unknown-unknown --release --bin "$name"
            mkdir -p "dist/$name"
            cp "target/wasm32-unknown-unknown/release/$name.wasm" "dist/$name/"
            python3 .mise/tasks/generate_game_html.py "$name"
            curl -sSfL "$MQ_JS" -o "dist/$name/mq_js_bundle.js"
          done
          cp static/* dist/

      - name: Generate root index
        env:
          GTAG_ID: ${{ secrets.GTAG_ID }}
        run: python3 .mise/tasks/generate_index.py

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
